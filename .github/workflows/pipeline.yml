name: Autopilot pipeline

permissions:
  contents: write

on:
  schedule:
    # Each channel now publishes both a short and a long-form video, on
    # its own cadence - shorts are cheap (~8-12 min/run) so they run
    # often; long-form is expensive (~28-30 min/run, chunked script
    # generation + longer voice/footage) so it runs a few times a week
    # instead of daily. The repo is public, so GitHub Actions minutes are
    # unlimited/free regardless - this cadence is about content pacing
    # and avoiding YouTube spam/quality risk, not a compute budget.
    - cron: '0 2,14 * * *'   # channel1 (TeslaTravel) short: twice daily
    - cron: '0 8 * * 1,3,5'  # channel1 (TeslaTravel) long: Mon/Wed/Fri
    - cron: '0 20 * * *'     # channel2 (Storytime Fables) short: daily
    - cron: '0 10 * * 2,4,6' # channel2 (Storytime Fables) long: Tue/Thu/Sat
  workflow_dispatch:
    inputs:
      channel:
        description: 'Run only this channel (leave blank to run both)'
        required: false
      format:
        description: 'Run only this format: short or long (leave blank to run both)'
        required: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      jobs: ${{ steps.set.outputs.jobs }}
    steps:
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            channels='["channel1","channel2"]'
            formats='["short","long"]'
            if [ -n "${{ github.event.inputs.channel }}" ]; then
              channels='["${{ github.event.inputs.channel }}"]'
            fi
            if [ -n "${{ github.event.inputs.format }}" ]; then
              formats='["${{ github.event.inputs.format }}"]'
            fi
            jobs=$(jq -cn --argjson channels "$channels" --argjson formats "$formats" \
              '[range(0; $channels|length) as $i | range(0; $formats|length) as $j | {channel: $channels[$i], format: $formats[$j]}]')
          else
            case "${{ github.event.schedule }}" in
              '0 2,14 * * *')   jobs='[{"channel":"channel1","format":"short"}]' ;;
              '0 8 * * 1,3,5')  jobs='[{"channel":"channel1","format":"long"}]' ;;
              '0 20 * * *')     jobs='[{"channel":"channel2","format":"short"}]' ;;
              '0 10 * * 2,4,6') jobs='[{"channel":"channel2","format":"long"}]' ;;
              *) jobs='[]' ;;
            esac
          fi
          echo "jobs=$jobs" >> "$GITHUB_OUTPUT"

  # Single parameterized job fanned out over (channel, format) pairs -
  # both channels now share the exact same pipeline shape (real stock
  # footage, no per-channel special-casing needed), so one matrix job
  # replaces what used to be two near-duplicate job definitions.
  publish:
    needs: plan
    if: needs.plan.outputs.jobs != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.jobs) }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: backend
        run: |
          # npm ci itself is safe to retry (always a clean reinstall from
          # the lockfile) - observed directly in production: ffmpeg-static's
          # postinstall binary download hit a transient 504 from GitHub's
          # release CDN and failed the whole job before the pipeline even
          # started.
          for attempt in 1 2 3; do
            if npm ci; then
              exit 0
            fi
            echo "npm ci attempt $attempt failed, retrying..."
            sleep $((attempt * 10))
          done
          echo "::error::npm ci failed after retries"
          exit 1
      - name: Install ffmpeg system libs (canvas native build)
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-llama3.2-v1
      - name: Start Ollama and pull model
        run: |
          # install.sh already enables+starts Ollama as a systemd service
          # bound to :11434 (confirmed via real CI logs: a manual
          # `ollama serve &` here just fails instantly with "address
          # already in use" and does nothing useful) - just wait for the
          # systemd-managed instance to be ready, then pull the model.
          # 60s (was 30s): observed one real run where the service just
          # hadn't come up yet at the 30s mark, failing the whole job -
          # a slow-starting systemd unit, not a real error, so more
          # margin here is cheap insurance.
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:11434/api/version && break
            sleep 1
          done
          ollama pull llama3.2
      - name: Run pipeline for ${{ matrix.channel }} (${{ matrix.format }})
        working-directory: backend
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN_CHANNEL1: ${{ secrets.YT_REFRESH_TOKEN_CHANNEL1 }}
          YT_REFRESH_TOKEN_CHANNEL2: ${{ secrets.YT_REFRESH_TOKEN_CHANNEL2 }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: node src/run-pipeline.js ${{ matrix.channel }} ${{ matrix.format }}
      - name: Dump Ollama server log on failure
        if: failure()
        # Ollama runs as a systemd service (see "Start Ollama and pull
        # model" above), not the foreground process a bare /tmp/ollama.log
        # redirect would capture - its real stdout/stderr (including
        # llama-server crash detail) is in the systemd journal.
        run: sudo journalctl -u ollama --no-pager -n 300 || true
      - name: Commit updated history
        working-directory: backend
        run: |
          git config user.name "autopilot-bot"
          git config user.email "actions@users.noreply.github.com"
          node scripts/merge-and-push-history.js ${{ matrix.channel }}
