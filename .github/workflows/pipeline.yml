name: Autopilot pipeline

permissions:
  contents: write

on:
  schedule:
    - cron: '0 14,2 * * *' # channel1: twice daily
    - cron: '0 6 * * 3'    # channel2: once weekly (Wed 06:00 UTC) - left at
                           # this cadence for now; the schedule predates the
                           # switch to real stock footage (was previously
                           # throttled by slow self-hosted Stable Diffusion
                           # generation) and could likely run more often now.
  workflow_dispatch:
    inputs:
      channel:
        description: 'Run only this channel (leave blank to run both, e.g. for manual testing)'
        required: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      channels: ${{ steps.set.outputs.channels }}
    steps:
      - id: set
        run: |
          if [ -n "${{ github.event.inputs.channel }}" ]; then
            echo 'channels=["${{ github.event.inputs.channel }}"]' >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "0 6 * * 3" ]; then
            echo 'channels=["channel2"]' >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo 'channels=["channel1"]' >> "$GITHUB_OUTPUT"
          else
            echo 'channels=["channel1","channel2"]' >> "$GITHUB_OUTPUT"
          fi

  # --- channel1: gradient visuals, fast, unchanged single-job flow ---
  publish-channel1:
    needs: plan
    if: contains(fromJson(needs.plan.outputs.channels), 'channel1')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      - name: Install ffmpeg system libs (canvas native build)
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-llama3.2-v1
      - name: Start Ollama and pull model
        run: |
          # install.sh already enables+starts Ollama as a systemd service
          # bound to :11434 (confirmed via real CI logs: a manual
          # `ollama serve &` here just fails instantly with "address
          # already in use" and does nothing useful) - just wait for the
          # systemd-managed instance to be ready, then pull the model.
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:11434/api/version && break
            sleep 1
          done
          ollama pull llama3.2
      - name: Run pipeline for channel1
        working-directory: backend
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN_CHANNEL1: ${{ secrets.YT_REFRESH_TOKEN_CHANNEL1 }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: node src/run-pipeline.js channel1
      - name: Dump Ollama server log on failure
        if: failure()
        # Ollama runs as a systemd service (see "Start Ollama and pull
        # model" above), not the foreground process a bare /tmp/ollama.log
        # redirect would capture - its real stdout/stderr (including
        # llama-server crash detail) is in the systemd journal.
        run: sudo journalctl -u ollama --no-pager -n 300 || true
      - name: Commit updated history
        working-directory: backend
        run: |
          git config user.name "autopilot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && exit 0
          git commit -m "chore: update history for channel1 [skip ci]"
          # Retries the rebase+push a few times: two runs updating the
          # same channel's history file close together (e.g. manual
          # re-triggers) can race and conflict on the first attempt, even
          # though there's normally 12h+ between real scheduled runs.
          for attempt in 1 2 3 4 5; do
            if git pull --rebase --autostash && git push; then
              exit 0
            fi
            echo "push attempt $attempt failed, retrying..."
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done
          echo "::error::could not push updated history after retries"
          exit 1

  # --- channel2: was split into prepare -> parallel image generation ->
  # finish, needed only because self-hosted Stable Diffusion was too slow
  # to generate 8-14 illustrated scenes serially on a GPU-less runner.
  # Now that this channel sources real stock footage (network downloads,
  # not CPU inference), that slowness is gone and a single job is enough -
  # same shape as publish-channel1. ---
  publish-channel2:
    needs: plan
    if: contains(fromJson(needs.plan.outputs.channels), 'channel2')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      - name: Install ffmpeg system libs (canvas native build)
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-llama3.2-v1
      - name: Start Ollama and pull model
        run: |
          # install.sh already enables+starts Ollama as a systemd service
          # bound to :11434 (confirmed via real CI logs: a manual
          # `ollama serve &` here just fails instantly with "address
          # already in use" and does nothing useful) - just wait for the
          # systemd-managed instance to be ready, then pull the model.
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:11434/api/version && break
            sleep 1
          done
          ollama pull llama3.2
      - name: Run pipeline for channel2
        working-directory: backend
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN_CHANNEL2: ${{ secrets.YT_REFRESH_TOKEN_CHANNEL2 }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: node src/run-pipeline.js channel2
      - name: Dump Ollama server log on failure
        if: failure()
        run: sudo journalctl -u ollama --no-pager -n 300 || true
      - name: Commit updated history
        working-directory: backend
        run: |
          git config user.name "autopilot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && exit 0
          git commit -m "chore: update history for channel2 [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git pull --rebase --autostash && git push; then
              exit 0
            fi
            echo "push attempt $attempt failed, retrying..."
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done
          echo "::error::could not push updated history after retries"
          exit 1
