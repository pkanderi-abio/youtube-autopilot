document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"a23bdbb0-5dbc-4c59-9b67-9cf5c05e2314\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n\n<style>\n  @keyframes pulseDot { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }\n  @keyframes tickerIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }\n  body { margin: 0; background: #0b0c0e; }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"display:flex; width:100%; min-height:100vh; background:#0b0c0e; font-family:-apple-system,'Helvetica Neue',Arial,sans-serif; color:#f2f1ee;\">\n\n  <!-- SIDEBAR -->\n  <div style=\"width:232px; flex:none; background:#101215; border-right:1px solid rgba(255,255,255,0.06); display:flex; flex-direction:column; padding:22px 16px; box-sizing:border-box;\">\n    <div style=\"display:flex; align-items:center; gap:9px; padding:4px 8px 22px;\">\n      <div style=\"width:10px; height:10px; border-radius:3px; background:#2ee6a6;\"><\u002Fdiv>\n      <div style=\"font-size:15px; font-weight:600; letter-spacing:-0.01em;\">Autopilot<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:flex; flex-direction:column; gap:2px;\">\n      <sc-for list=\"{{ navItems }}\" as=\"nav\" hint-placeholder-count=\"5\">\n        <div onclick=\"{{ nav.onClick }}\" style=\"cursor:pointer; padding:9px 12px; border-radius:7px; font-size:13.5px; font-weight:500; display:flex; align-items:center; gap:10px; background:{{ nav.bg }}; color:{{ nav.color }};\">\n          <div style=\"width:6px; height:6px; border-radius:2px; background:{{ nav.dotColor }};\"><\u002Fdiv>\n          {{ nav.label }}\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:auto; padding:14px 12px; border-radius:10px; background:rgba(46,230,166,0.07); border:1px solid rgba(46,230,166,0.18);\">\n      <div style=\"display:flex; align-items:center; gap:7px; margin-bottom:5px;\">\n        <div style=\"width:6px; height:6px; border-radius:50%; background:#2ee6a6; animation:pulseDot 1.6s infinite;\"><\u002Fdiv>\n        <div style=\"font-size:11.5px; font-weight:600; color:#2ee6a6; letter-spacing:0.02em;\">FULLY AUTONOMOUS<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:11.5px; color:rgba(242,241,238,0.45); line-height:1.4;\">No approvals required. Every stage runs unattended, 24/7.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- MAIN -->\n  <div style=\"flex:1; min-width:0; padding:28px 36px 40px; box-sizing:border-box;\">\n\n    <!-- ===== OVERVIEW ===== -->\n    <sc-if value=\"{{ tab==='overview' }}\">\n      <div>\n        <div style=\"display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:26px;\">\n          <div>\n            <div style=\"font-size:21px; font-weight:600; letter-spacing:-0.01em;\">Overview<\u002Fdiv>\n            <div style=\"font-size:13px; color:rgba(242,241,238,0.45); margin-top:4px;\">Tuesday, July 7 · both channels running · last cycle {{ secondsAgoLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:8px;\">\n            <sc-for list=\"{{ channels }}\" as=\"ch\" hint-placeholder-count=\"2\">\n              <div onclick=\"{{ ch.onClick }}\" style=\"cursor:pointer; padding:8px 14px; border-radius:9px; border:1px solid {{ ch.chipBorder }}; background:{{ ch.chipBg }}; font-size:12.5px; font-weight:500; color:{{ ch.chipColor }};\">{{ ch.name }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- KPI row -->\n        <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px;\">\n          <div style=\"background:#15181c; border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:18px 20px;\">\n            <div style=\"font-size:11.5px; color:rgba(242,241,238,0.45); font-weight:500; margin-bottom:8px;\">Est. revenue (30d)<\u002Fdiv>\n            <div style=\"font-size:26px; font-weight:600; font-family:ui-monospace,'SF Mono',monospace; color:#2ee6a6;\">{{ activeChannel.revenueLabel }}<\u002Fdiv>\n            <div style=\"font-size:11.5px; color:rgba(46,230,166,0.7); margin-top:6px;\">↑ {{ activeChannel.revenueDelta }} vs prior 30d<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#15181c; border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:18px 20px;\">\n            <div style=\"font-size:11.5px; color:rgba(242,241,238,0.45); font-weight:500; margin-bottom:8px;\">Videos published (24h)<\u002Fdiv>\n            <div style=\"font-size:26px; font-weight:600; font-family:ui-monospace,'SF Mono',monospace;\">{{ activeChannel.publishedToday }}<\u002Fdiv>\n            <div style=\"font-size:11.5px; color:rgba(242,241,238,0.4); margin-top:6px;\">{{ activeChannel.shortsVsLong }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#15181c; border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:18px 20px;\">\n            <div style=\"font-size:11.5px; color:rgba(242,241,238,0.45); font-weight:500; margin-bottom:8px;\">Avg. RPM<\u002Fdiv>\n            <div style=\"font-size:26px; font-weight:600; font-family:ui-monospace,'SF Mono',monospace;\">{{ activeChannel.rpm }}<\u002Fdiv>\n            <div style=\"font-size:11.5px; color:rgba(242,241,238,0.4); margin-top:6px;\">across last 50 videos<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#15181c; border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:18px 20px;\">\n            <div style=\"font-size:11.5px; color:rgba(242,241,238,0.45); font-weight:500; margin-bottom:8px;\">Subscribers<\u002Fdiv>\n            <div style=\"font-size:26px; font-weight:600; font-family:ui-monospace,'SF Mono',monospace;\">{{ activeChannel.subs }}<\u002Fdiv>\n            <div style=\"font-size:11.5px; color:#4f7dff; margin-top:6px;\">+{{ activeChannel.subsDelta }} this week<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:1.3fr 1fr; gap:14px; margin-bottom:22px;\">\n          <!-- revenue chart -->\n          <div style=\"background:#15181c; border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:20px 22px;\">\n            <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;\">\n              <div style=\"font-size:13px; font-weight:600;\">Revenue, last 14 days<\u002Fdiv>\n              <div style=\"font-size:11.5px; color:rgba(242,241,238,0.4);\">both channels combined<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex; align-items:flex-end; gap:6px; height:120px;\">\n              <sc-for list=\"{{ revenueBars }}\" as=\"bar\" hint-placeholder-count=\"14\">\n                <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end;\">\n                  <div style=\"width:100%; border-radius:4px 4px 2px 2px; background:{{ bar.color }}; height:{{ bar.h }};\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- live feed -->\n          <div style=\"background:#15181c; border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:20px 22px; display:flex; flex-direction:column;\">\n            <div style=\"display:flex; align-items:center; gap:7px; margin-bottom:14px;\">\n              <div style=\"width:6px; height:6px; border-radius:50%; background:#4f7dff; animation:pulseDot 1.4s infinite;\"><\u002Fdiv>\n              <div style=\"font-size:13px; font-weight:600;\">Live activity<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:11px; overflow:hidden;\">\n              <sc-for list=\"{{ feed }}\" as=\"item\" hint-placeholder-count=\"6\">\n                <div style=\"animation:tickerIn 0.4s ease; font-size:12px; line-height:1.5;\">\n                  <span style=\"color:rgba(242,241,238,0.35); font-family:ui-monospace,monospace; font-size:10.5px; margin-right:7px;\">{{ item.time }}<\u002Fspan>\n                  <span style=\"color:rgba(242,241,238,0.8);\">{{ item.text }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- recent videos -->\n        <div style=\"background:#15181c; border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:20px 22px;\">\n          <div style=\"font-size:13px; font-weight:600; margin-bottom:16px;\">Recently published · {{ activeChannel.name }}<\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:repeat(5,1fr); gap:14px;\">\n            <sc-for list=\"{{ activeChannel.videos }}\" as=\"v\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex; flex-direction:column; gap:8px;\">\n                <div style=\"aspect-ratio:{{ v.ratio }}; border-radius:8px; background:repeating-linear-gradient(135deg, {{ v.stripeA }}, {{ v.stripeA }} 8px, {{ v.stripeB }} 8px, {{ v.stripeB }} 16px); display:flex; align-items:center; justify-content:center; position:relative;\">\n                  <span style=\"font-family:ui-monospace,monospace; font-size:9.5px; color:rgba(255,255,255,0.55); background:rgba(0,0,0,0.4); padding:3px 6px; border-radius:4px;\">{{ v.format }} thumb<\u002Fspan>\n                  <span style=\"position:absolute; bottom:6px; right:6px; font-family:ui-monospace,monospace; font-size:9.5px; background:rgba(0,0,0,0.55); color:#fff; padding:2px 5px; border-radius:3px;\">{{ v.duration }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:12px; font-weight:500; line-height:1.3;\">{{ v.title }}<\u002Fdiv>\n                <div style=\"display:flex; justify-content:space-between; font-size:11px; color:rgba(242,241,238,0.45);\">\n                  <span>{{ v.views }} views<\u002Fspan>\n                  <span style=\"color:#2ee6a6;\">{{ v.revenue }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== PIPELINE ===== -->\n    <sc-if value=\"{{ tab==='pipeline' }}\">\n      <div>\n        <div style=\"font-size:21px; font-weight:600; letter-spacing:-0.01em; margin-bottom:4px;\">Pipeline<\u002Fdiv>\n        <div style=\"font-size:13px; color:rgba(242,241,238,0.45); margin-bottom:26px;\">Seven stages run continuously for both channels — no manual trigger, no review queue.<\u002Fdiv>\n\n        <div style=\"display:flex; flex-direction:column; gap:10px;\">\n          <sc-for list=\"{{ stages }}\" as=\"s\" hint-placeholder-count=\"7\">\n            <div style=\"display:flex; align-items:center; gap:18px; background:#15181c; border:1px solid {{ s.cardBorder }}; border-radius:12px; padding:16px 20px;\">\n              <div style=\"width:30px; height:30px; border-radius:8px; background:{{ s.iconBg }}; display:flex; align-items:center; justify-content:center; flex:none;\">\n                <div style=\"width:9px; height:9px; border-radius:50%; background:{{ s.dotColor }}; animation:{{ s.dotAnim }};\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"flex:none; width:26px; font-family:ui-monospace,monospace; font-size:11px; color:rgba(242,241,238,0.3);\">{{ s.num }}<\u002Fdiv>\n              <div style=\"flex:1;\">\n                <div style=\"font-size:14px; font-weight:600;\">{{ s.label }}<\u002Fdiv>\n                <div style=\"font-size:12px; color:rgba(242,241,238,0.45); margin-top:2px;\">{{ s.desc }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"text-align:right; flex:none; width:150px;\">\n                <div style=\"font-size:12px; font-weight:600; color:{{ s.statusColor }};\">{{ s.statusText }}<\u002Fdiv>\n                <div style=\"font-size:11px; color:rgba(242,241,238,0.35); margin-top:2px;\">{{ s.meta }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== QUEUE ===== -->\n    <sc-if value=\"{{ tab==='queue' }}\">\n      <div>\n        <div style=\"font-size:21px; font-weight:600; letter-spacing:-0.01em; margin-bottom:4px;\">Content queue<\u002Fdiv>\n        <div style=\"font-size:13px; color:rgba(242,241,238,0.45); margin-bottom:22px;\">Auto-generated jobs moving through the pipeline right now.<\u002Fdiv>\n\n        <div style=\"display:flex; flex-direction:column; gap:1px; background:rgba(255,255,255,0.06); border-radius:12px; overflow:hidden; border:1px solid rgba(255,255,255,0.07);\">\n          <div style=\"display:grid; grid-template-columns:1.8fr 0.8fr 0.9fr 1.6fr 0.7fr; gap:12px; padding:12px 20px; background:#101215; font-size:11px; color:rgba(242,241,238,0.4); font-weight:600; letter-spacing:0.03em; text-transform:uppercase;\">\n            <div>Title<\u002Fdiv><div>Channel<\u002Fdiv><div>Format<\u002Fdiv><div>Stage<\u002Fdiv><div>ETA<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ queue }}\" as=\"q\" hint-placeholder-count=\"6\">\n            <div style=\"display:grid; grid-template-columns:1.8fr 0.8fr 0.9fr 1.6fr 0.7fr; gap:12px; padding:14px 20px; background:#15181c; align-items:center;\">\n              <div style=\"font-size:13px; font-weight:500;\">{{ q.title }}<\u002Fdiv>\n              <div style=\"font-size:12px; color:rgba(242,241,238,0.5);\">{{ q.channel }}<\u002Fdiv>\n              <div style=\"font-size:12px; color:rgba(242,241,238,0.5);\">{{ q.format }}<\u002Fdiv>\n              <div>\n                <div style=\"display:flex; align-items:center; gap:8px;\">\n                  <div style=\"flex:1; height:5px; border-radius:3px; background:rgba(255,255,255,0.08); overflow:hidden;\">\n                    <div style=\"height:100%; border-radius:3px; background:#4f7dff; width:{{ q.progress }};\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"font-size:11px; color:rgba(242,241,238,0.45); white-space:nowrap;\">{{ q.stageLabel }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:12px; color:rgba(242,241,238,0.45); font-family:ui-monospace,monospace;\">{{ q.eta }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== CHANNELS ===== -->\n    <sc-if value=\"{{ tab==='channels' }}\">\n      <div>\n        <div style=\"font-size:21px; font-weight:600; letter-spacing:-0.01em; margin-bottom:4px;\">Channels<\u002Fdiv>\n        <div style=\"font-size:13px; color:rgba(242,241,238,0.45); margin-bottom:22px;\">Both channels are managed and posted to automatically.<\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px;\">\n          <sc-for list=\"{{ channels }}\" as=\"ch\" hint-placeholder-count=\"2\">\n            <div style=\"background:#15181c; border:1px solid rgba(255,255,255,0.07); border-radius:14px; padding:22px;\">\n              <div style=\"display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px;\">\n                <div>\n                  <div style=\"font-size:16px; font-weight:600;\">{{ ch.name }}<\u002Fdiv>\n                  <div style=\"font-size:12.5px; color:rgba(242,241,238,0.45); margin-top:3px;\">{{ ch.niche }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:6px; background:rgba(46,230,166,0.1); border:1px solid rgba(46,230,166,0.25); padding:5px 10px; border-radius:20px;\">\n                  <div style=\"width:6px; height:6px; border-radius:50%; background:#2ee6a6;\"><\u002Fdiv>\n                  <span style=\"font-size:11px; color:#2ee6a6; font-weight:600;\">Live<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;\">\n                <div style=\"background:#101215; border-radius:9px; padding:12px 14px;\">\n                  <div style=\"font-size:10.5px; color:rgba(242,241,238,0.4);\">Subscribers<\u002Fdiv>\n                  <div style=\"font-size:17px; font-weight:600; font-family:ui-monospace,monospace; margin-top:4px;\">{{ ch.subs }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"background:#101215; border-radius:9px; padding:12px 14px;\">\n                  <div style=\"font-size:10.5px; color:rgba(242,241,238,0.4);\">Revenue (30d)<\u002Fdiv>\n                  <div style=\"font-size:17px; font-weight:600; font-family:ui-monospace,monospace; margin-top:4px; color:#2ee6a6;\">{{ ch.revenueLabel }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:12px; color:rgba(242,241,238,0.5); line-height:1.6;\">\n                <div><span style=\"color:rgba(242,241,238,0.35);\">Cadence ·<\u002Fspan> {{ ch.cadence }}<\u002Fdiv>\n                <div><span style=\"color:rgba(242,241,238,0.35);\">Content source ·<\u002Fspan> trending topics, auto-selected<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== SETTINGS ===== -->\n    <sc-if value=\"{{ tab==='settings' }}\">\n      <div style=\"max-width:640px;\">\n        <div style=\"font-size:21px; font-weight:600; letter-spacing:-0.01em; margin-bottom:4px;\">Settings<\u002Fdiv>\n        <div style=\"font-size:13px; color:rgba(242,241,238,0.45); margin-bottom:22px;\">Autonomy level and connected services.<\u002Fdiv>\n\n        <div style=\"background:#15181c; border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:20px 22px; margin-bottom:14px;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:center;\">\n            <div>\n              <div style=\"font-size:14px; font-weight:600;\">Autonomy level<\u002Fdiv>\n              <div style=\"font-size:12px; color:rgba(242,241,238,0.45); margin-top:3px;\">Fully autonomous — no approval step before publish.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"width:44px; height:26px; border-radius:13px; background:#2ee6a6; position:relative; flex:none;\">\n              <div style=\"width:20px; height:20px; border-radius:50%; background:#0b0c0e; position:absolute; top:3px; right:3px;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#15181c; border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:20px 22px; margin-bottom:14px;\">\n          <div style=\"font-size:14px; font-weight:600; margin-bottom:14px;\">Content strategy<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:14px;\">\n            <div>\n              <div style=\"display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:6px;\"><span>Topic selection<\u002Fspan><span style=\"color:rgba(242,241,238,0.45);\">Trending, any category<\u002Fspan><\u002Fdiv>\n              <div style=\"height:5px; border-radius:3px; background:rgba(255,255,255,0.08);\"><div style=\"height:100%; width:88%; border-radius:3px; background:#4f7dff;\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:6px;\"><span>Posting frequency<\u002Fspan><span style=\"color:rgba(242,241,238,0.45);\">High<\u002Fspan><\u002Fdiv>\n              <div style=\"height:5px; border-radius:3px; background:rgba(255,255,255,0.08);\"><div style=\"height:100%; width:76%; border-radius:3px; background:#4f7dff;\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:6px;\"><span>Brand safety filter<\u002Fspan><span style=\"color:rgba(242,241,238,0.45);\">Strict<\u002Fspan><\u002Fdiv>\n              <div style=\"height:5px; border-radius:3px; background:rgba(255,255,255,0.08);\"><div style=\"height:100%; width:95%; border-radius:3px; background:#2ee6a6;\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#15181c; border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:20px 22px;\">\n          <div style=\"font-size:14px; font-weight:600; margin-bottom:14px;\">Connected services<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:1px; background:rgba(255,255,255,0.06); border-radius:8px; overflow:hidden;\">\n            <sc-for list=\"{{ services }}\" as=\"svc\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex; justify-content:space-between; align-items:center; padding:11px 16px; background:#15181c;\">\n                <span style=\"font-size:12.5px;\">{{ svc.name }}<\u002Fspan>\n                <div style=\"display:flex; align-items:center; gap:6px;\">\n                  <div style=\"width:6px; height:6px; border-radius:50%; background:#2ee6a6;\"><\u002Fdiv>\n                  <span style=\"font-size:11px; color:#2ee6a6;\">Connected<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    tab: 'overview',\n    channelId: 'c1',\n    processingIdx: 2,\n    feed: [\n      { time: '11:42:03', text: 'Scanned trending topics across YouTube, TikTok, Google Trends — 312 candidates scored' },\n      { time: '11:41:10', text: 'Selected topic \"5-minute desk stretches\" for Channel B (predicted CTR 9.4%)' },\n      { time: '11:39:55', text: 'Script generated for Short #4821 — 41s runtime' },\n      { time: '11:38:22', text: 'Voiceover + b-roll render complete for Short #4821' },\n      { time: '11:37:01', text: 'Thumbnail A/B pair generated for Short #4821' },\n      { time: '11:35:40', text: 'Published Short #4820 to Wanderlust Clips' }\n    ],\n    revStart: 184200\n  };\n\n  componentDidMount() {\n    this._i = setInterval(() => this.tick(), 4200);\n  }\n  componentWillUnmount() {\n    clearInterval(this._i);\n  }\n\n  tick() {\n    const pool = [\n      'Scanned trending topics across YouTube, TikTok, Google Trends',\n      'Ranked 340 candidate topics by predicted watch-time',\n      'Script generated for new Short — 38s runtime',\n      'Voiceover synthesized and b-roll assembled',\n      'Thumbnail variants generated, top performer auto-selected',\n      'Scheduled next upload slot for Quick Facts Daily',\n      'Published new video — added to analytics tracking',\n      'Updated RPM model from last 24h performance'\n    ];\n    const now = new Date();\n    const time = now.toTimeString().slice(0,8);\n    const text = pool[Math.floor(Math.random() * pool.length)];\n    this.setState(s => ({\n      processingIdx: (s.processingIdx + 1) % 7,\n      feed: [{ time, text }, ...s.feed].slice(0, 6),\n      revStart: s.revStart + Math.floor(Math.random() * 40)\n    }));\n  }\n\n  renderVals() {\n    const channelsData = {\n      c1: {\n        id: 'c1', name: 'Wanderlust Clips', niche: 'Trending travel & lifestyle moments',\n        subs: '186K', subsDelta: '2.1K', revenueLabel: '$4,920', revenueDelta: '18%',\n        publishedToday: 9, shortsVsLong: '7 shorts · 2 long-form', rpm: '$6.80',\n        cadence: '6 shorts/day, 1 long-form/week',\n        videos: [\n          { title: 'This café view is unreal', views: '812K', revenue: '$412', duration: '0:34', format: 'Short', ratio: '9/16', stripeA: 'rgba(79,125,255,0.35)', stripeB: 'rgba(79,125,255,0.15)' },\n          { title: '3 places everyone is booking right now', views: '540K', revenue: '$298', duration: '0:47', format: 'Short', ratio: '9/16', stripeA: 'rgba(46,230,166,0.3)', stripeB: 'rgba(46,230,166,0.12)' },\n          { title: 'Why this island trended overnight', views: '1.2M', revenue: '$780', duration: '8:12', format: 'Long', ratio: '16/9', stripeA: 'rgba(255,184,79,0.3)', stripeB: 'rgba(255,184,79,0.12)' },\n          { title: 'POV: last minute flight deal', views: '298K', revenue: '$140', duration: '0:29', format: 'Short', ratio: '9/16', stripeA: 'rgba(79,125,255,0.28)', stripeB: 'rgba(79,125,255,0.1)' },\n          { title: 'Rating viral travel hacks', views: '674K', revenue: '$355', duration: '6:41', format: 'Long', ratio: '16/9', stripeA: 'rgba(46,230,166,0.28)', stripeB: 'rgba(46,230,166,0.1)' }\n        ]\n      },\n      c2: {\n        id: 'c2', name: 'Quick Facts Daily', niche: 'Whatever topic is spiking today',\n        subs: '94K', subsDelta: '1.4K', revenueLabel: '$2,610', revenueDelta: '26%',\n        publishedToday: 6, shortsVsLong: '5 shorts · 1 long-form', rpm: '$5.20',\n        cadence: '4 shorts/day, 2 long-form/week',\n        videos: [\n          { title: 'The stat everyone got wrong this week', views: '410K', revenue: '$190', duration: '0:38', format: 'Short', ratio: '9/16', stripeA: 'rgba(255,93,93,0.25)', stripeB: 'rgba(255,93,93,0.1)' },\n          { title: 'Explained in under a minute', views: '288K', revenue: '$118', duration: '0:52', format: 'Short', ratio: '9/16', stripeA: 'rgba(79,125,255,0.28)', stripeB: 'rgba(79,125,255,0.1)' },\n          { title: 'Deep dive: the trend, explained', views: '520K', revenue: '$310', duration: '9:04', format: 'Long', ratio: '16/9', stripeA: 'rgba(46,230,166,0.28)', stripeB: 'rgba(46,230,166,0.1)' },\n          { title: '5 facts that broke the internet', views: '190K', revenue: '$88', duration: '0:41', format: 'Short', ratio: '9/16', stripeA: 'rgba(255,184,79,0.28)', stripeB: 'rgba(255,184,79,0.1)' },\n          { title: \"Fact-checking today's viral post\", views: '355K', revenue: '$164', duration: '0:36', format: 'Short', ratio: '9/16', stripeA: 'rgba(79,125,255,0.25)', stripeB: 'rgba(79,125,255,0.1)' }\n        ]\n      }\n    };\n\n    const stageDefs = [\n      { key: 'trend', label: 'Trend & topic discovery', desc: \"Cross-references YouTube, TikTok and Google Trends to rank what's spiking right now\", meta: '312 topics scanned this hour' },\n      { key: 'script', label: 'Script generation', desc: 'Drafts a hook, body and CTA tuned to the selected topic and channel voice', meta: 'Avg. 22s generation time' },\n      { key: 'voice', label: 'Voiceover & video generation', desc: 'Synthesizes narration and assembles b-roll / motion graphics into a rendered cut', meta: 'Avg. 3.1 min per Short' },\n      { key: 'thumb', label: 'Thumbnail generation', desc: 'Produces 3 thumbnail variants and predicts CTR before picking a winner', meta: 'CTR model v4.2' },\n      { key: 'sched', label: 'Auto-scheduling', desc: \"Places each finished video into the optimal slot for its channel's audience\", meta: 'Next slot in 41 min' },\n      { key: 'post', label: 'Posting', desc: 'Publishes directly to YouTube with title, description and tags — no review step', meta: '15 videos posted today' },\n      { key: 'analytics', label: 'Performance & income tracking', desc: 'Feeds real watch-time and RPM data back into topic and thumbnail selection', meta: 'Updated every 15 min' }\n    ];\n    const stages = stageDefs.map((s, i) => {\n      const processing = i === this.state.processingIdx;\n      return {\n        ...s, num: '0' + (i + 1), processing,\n        cardBorder: processing ? 'rgba(79,125,255,0.35)' : 'rgba(255,255,255,0.07)',\n        iconBg: processing ? 'rgba(79,125,255,0.15)' : 'rgba(255,255,255,0.05)',\n        dotColor: processing ? '#4f7dff' : '#2ee6a6',\n        dotAnim: processing ? 'pulseDot 1s infinite' : 'none',\n        statusColor: processing ? '#4f7dff' : 'rgba(242,241,238,0.6)',\n        statusText: processing ? 'Processing now' : 'Idle · healthy'\n      };\n    });\n\n    const revenueBars = [62,70,58,80,75,90,85,72,95,88,100,92,110,96].map((v, i) => {\n      const isToday = i === 13;\n      return { h: (30 + v * 0.7) + 'px', color: isToday ? '#2ee6a6' : 'rgba(46,230,166,0.28)' };\n    });\n\n    const queue = [\n      { title: 'The airport hack nobody tells you', channel: 'Wanderlust Clips', format: 'Short', progress: '82%', stageLabel: 'Thumbnail gen', eta: '4 min' },\n      { title: 'Why this number is trending today', channel: 'Quick Facts Daily', format: 'Short', progress: '58%', stageLabel: 'Video render', eta: '11 min' },\n      { title: 'Rating 10 viral vacation spots', channel: 'Wanderlust Clips', format: 'Long', progress: '35%', stageLabel: 'Script gen', eta: '26 min' },\n      { title: 'This fact broke the internet', channel: 'Quick Facts Daily', format: 'Short', progress: '20%', stageLabel: 'Script gen', eta: '33 min' },\n      { title: 'Hidden gem, 40K searches this week', channel: 'Wanderlust Clips', format: 'Short', progress: '95%', stageLabel: 'Scheduling', eta: '2 min' },\n      { title: 'Explained before it stops trending', channel: 'Quick Facts Daily', format: 'Long', progress: '12%', stageLabel: 'Topic discovery', eta: '48 min' }\n    ];\n\n    const services = [\n      { name: 'YouTube Data & Upload API' },\n      { name: 'Trend intelligence feed' },\n      { name: 'Script / language model' },\n      { name: 'Voice & video generation' },\n      { name: 'Thumbnail & CTR model' }\n    ];\n\n    const active = channelsData[this.state.channelId];\n\n    const tabDefs = [\n      { key: 'overview', label: 'Overview' },\n      { key: 'pipeline', label: 'Pipeline' },\n      { key: 'queue', label: 'Content queue' },\n      { key: 'channels', label: 'Channels' },\n      { key: 'settings', label: 'Settings' }\n    ];\n    const navItems = tabDefs.map(t => {\n      const isActive = t.key === this.state.tab;\n      return {\n        key: t.key, label: t.label,\n        onClick: () => this.setState({ tab: t.key }),\n        bg: isActive ? 'rgba(255,255,255,0.06)' : 'transparent',\n        color: isActive ? '#f2f1ee' : 'rgba(242,241,238,0.55)',\n        dotColor: isActive ? '#2ee6a6' : 'rgba(242,241,238,0.25)'\n      };\n    });\n\n    const channels = Object.values(channelsData).map(ch => {\n      const isActive = ch.id === this.state.channelId;\n      return {\n        ...ch,\n        onClick: () => this.setState({ channelId: ch.id }),\n        chipBorder: isActive ? 'rgba(46,230,166,0.4)' : 'rgba(255,255,255,0.08)',\n        chipBg: isActive ? 'rgba(46,230,166,0.08)' : 'transparent',\n        chipColor: isActive ? '#2ee6a6' : 'rgba(242,241,238,0.5)'\n      };\n    });\n\n    return {\n      tab: this.state.tab,\n      setTab: (t) => this.setState({ tab: t }),\n      channelId: this.state.channelId,\n      setChannel: (id) => this.setState({ channelId: id }),\n      navItems,\n      channels,\n      activeChannel: active,\n      stages,\n      revenueBars,\n      feed: this.state.feed,\n      queue,\n      services,\n      secondsAgoLabel: 'moments ago'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
