<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Automation Dashboard</title>
  <style>
    :root {
      --bg: #08090d;
      --bg-elevated: #10141b;
      --panel: #151922;
      --panel-2: #1a2029;
      --border: rgba(255,255,255,0.08);
      --text: #f4f2eb;
      --muted: rgba(244,242,235,0.58);
      --accent: #2ee6a6;
      --accent-2: #6f8cff;
      --warning: #ffb84d;
      --danger: #ff5f7e;
      --shadow: 0 12px 32px rgba(0,0,0,0.28);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, rgba(46,230,166,0.1), transparent 28%), var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    button { font: inherit; }
    a { color: inherit; }

    .app-shell {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 248px;
      flex: 0 0 248px;
      padding: 24px 18px 24px;
      border-right: 1px solid var(--border);
      background: rgba(16,20,27,0.95);
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 8px 12px;
    }

    .brand-mark {
      width: 13px;
      height: 13px;
      border-radius: 4px;
      background: linear-gradient(135deg, var(--accent), #63ffd3);
      box-shadow: 0 0 14px rgba(46,230,166,0.35);
    }

    .brand strong { font-size: 1rem; letter-spacing: -0.02em; }

    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nav-item {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 10px 12px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      cursor: pointer;
      transition: background 180ms ease, color 180ms ease;
    }

    .nav-item.active {
      background: rgba(46,230,166,0.12);
      color: var(--text);
    }

    .nav-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
    }

    .nav-item.active .nav-dot { background: var(--accent); }

    .sidebar-card {
      margin-top: auto;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(46,230,166,0.2);
      background: rgba(46,230,166,0.08);
    }

    .sidebar-card .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .sidebar-card .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.8s infinite;
    }

    .sidebar-card small { color: var(--muted); line-height: 1.45; }

    .main {
      flex: 1;
      padding: 28px 32px 36px;
      overflow: auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 22px;
    }

    .title-group h1 { margin: 0 0 4px; font-size: 1.55rem; letter-spacing: -0.03em; }
    .title-group p { margin: 0; color: var(--muted); }

    .switch-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 14px;
      background: rgba(255,255,255,0.03);
      color: var(--text);
      cursor: pointer;
    }

    .chip.active {
      background: rgba(46,230,166,0.12);
      border-color: rgba(46,230,166,0.24);
      color: #cfffec;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .kpi-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-bottom: 6px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
      box-shadow: var(--shadow);
    }

    .stat-label { color: var(--muted); font-size: 0.8rem; margin-bottom: 8px; }
    .stat-value { font-size: 1.65rem; font-weight: 600; letter-spacing: -0.03em; }
    .stat-meta { margin-top: 8px; font-size: 0.8rem; color: var(--accent); }
    .stat-meta.warn { color: var(--warning); }
    .stat-meta.bad { color: var(--danger); }
    .stat-meta.muted { color: var(--muted); }

    .overview-grid {
      grid-template-columns: 1.6fr 1fr;
      align-items: start;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .section-title h2 { margin: 0; font-size: 1rem; }
    .section-title span { color: var(--muted); font-size: 0.8rem; }

    .pipeline-list {
      display: grid;
      gap: 10px;
    }

    .pipeline-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .pipeline-item:last-child { border-bottom: 0; padding-bottom: 0; }

    .pipeline-left { display: flex; align-items: center; gap: 10px; }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(255,255,255,0.05);
      color: var(--text);
    }

    .status-pill.running { background: rgba(46,230,166,0.15); color: #cfffec; }
    .status-pill.pending { background: rgba(255,184,77,0.16); color: #ffd18d; }
    .status-pill.done { background: rgba(111,140,255,0.16); color: #dfe4ff; }
    .status-pill.failed { background: rgba(255,95,126,0.18); color: #ffd1da; }

    .status-dot-small {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .queue-list,
    .feed-list { display: flex; flex-direction: column; gap: 10px; }

    .queue-item,
    .feed-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.04);
      text-decoration: none;
    }

    .queue-item strong,
    .feed-item strong { display: block; font-size: 0.95rem; margin-bottom: 2px; }
    .queue-item small,
    .feed-item small { color: var(--muted); }

    .channel-list { display: flex; flex-direction: column; gap: 10px; }
    .channel-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .channel-line:last-child { border-bottom: 0; padding-bottom: 0; }

    .channel-line b { display: block; margin-bottom: 2px; font-size: 0.95rem; }
    .channel-line small { color: var(--muted); }

    .pill-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .pill { padding: 6px 8px; border-radius: 999px; background: rgba(255,255,255,0.05); color: var(--muted); font-size: 0.74rem; white-space: nowrap; }
    .pill.on { background: rgba(46,230,166,0.14); color: #cfffec; }
    .pill.off { background: rgba(255,255,255,0.05); color: var(--muted); }

    .empty-state { color: var(--muted); font-size: 0.9rem; }

    .content-grid {
      grid-template-columns: 1.2fr 0.8fr;
    }

    .settings-list { display: flex; flex-direction: column; gap: 10px; }
    .settings-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.04);
      gap: 12px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    @media (max-width: 1080px) {
      .kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .overview-grid, .content-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      .app-shell { flex-direction: column; }
      .sidebar { width: 100%; flex-basis: auto; border-right: 0; border-bottom: 1px solid var(--border); }
      .main { padding: 20px 16px 28px; }
      .kpi-grid { grid-template-columns: 1fr; }
      .topbar { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark"></div>
        <strong>Autopilot</strong>
      </div>

      <nav class="nav-list" id="navList"></nav>

      <div class="sidebar-card" id="sidebarCard">
        <div class="status-row">
          <div class="status-dot"></div>
          <strong style="font-size:0.85rem; letter-spacing:0.02em;">FULLY AUTONOMOUS</strong>
        </div>
        <small>No approvals required. Every stage runs unattended, on a GitHub Actions cron schedule.</small>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="title-group">
          <h1 id="pageTitle">Overview</h1>
          <p id="pageSubtext">Loading real backend state&hellip;</p>
        </div>
        <div class="switch-row" id="channelChips"></div>
      </div>

      <div id="content"><p class="empty-state">Loading data.json&hellip;</p></div>
    </main>
  </div>

  <script>
    const state = {
      tab: 'overview',
      channel: 'All channels',
      data: null
    };

    const navItems = [
      { id: 'overview', label: 'Overview', dotColor: '#2ee6a6' },
      { id: 'pipeline', label: 'Pipeline', dotColor: '#6f8cff' },
      { id: 'content', label: 'Recent uploads', dotColor: '#ffb84d' },
      { id: 'settings', label: 'Channel config', dotColor: '#ff5f7e' }
    ];

    function timeAgo(iso) {
      if (!iso) return 'never';
      const ms = Date.now() - new Date(iso).getTime();
      const mins = Math.round(ms / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + 'm ago';
      const hours = Math.round(mins / 60);
      if (hours < 24) return hours + 'h ago';
      return Math.round(hours / 24) + 'd ago';
    }

    function timeUntil(iso) {
      const ms = new Date(iso).getTime() - Date.now();
      const mins = Math.round(ms / 60000);
      if (mins < 60) return 'in ' + Math.max(mins, 0) + 'm';
      const hours = Math.round(mins / 60);
      if (hours < 24) return 'in ' + hours + 'h';
      return 'in ' + Math.round(hours / 24) + 'd';
    }

    function selectedChannels() {
      const { channels } = state.data;
      if (state.channel === 'All channels') return channels;
      return channels.filter(c => c.name === state.channel);
    }

    function conclusionMeta(conclusion) {
      if (conclusion === 'success') return { text: '✓ last run succeeded', cls: '' };
      if (conclusion === 'failure') return { text: '✕ last run failed', cls: 'bad' };
      if (conclusion === 'in_progress' || conclusion === 'queued') return { text: '● run in progress', cls: 'warn' };
      if (conclusion === 'cancelled') return { text: '○ last run cancelled', cls: 'muted' };
      return { text: 'no runs yet', cls: 'muted' };
    }

    function renderNav() {
      const el = document.getElementById('navList');
      el.innerHTML = navItems.map(item => `
        <button class="nav-item ${item.id === state.tab ? 'active' : ''}" data-tab="${item.id}">
          <span class="nav-dot" style="background:${item.dotColor}"></span>
          ${item.label}
        </button>
      `).join('');
      el.querySelectorAll('[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => { state.tab = btn.getAttribute('data-tab'); render(); });
      });
    }

    function renderChips() {
      const el = document.getElementById('channelChips');
      const names = ['All channels', ...state.data.channels.map(c => c.name)];
      el.innerHTML = names.map(name => `
        <button class="chip ${name === state.channel ? 'active' : ''}" data-channel="${name}">${name}</button>
      `).join('');
      el.querySelectorAll('[data-channel]').forEach(btn => {
        btn.addEventListener('click', () => { state.channel = btn.getAttribute('data-channel'); render(); });
      });
    }

    function renderOverview() {
      const channels = selectedChannels();
      const totalVideos = channels.reduce((sum, c) => sum + c.totalVideos, 0);
      const videos7d = channels.reduce((sum, c) => sum + c.videosLast7Days, 0);
      const mostRecent = channels
        .map(c => c.lastPublished)
        .filter(Boolean)
        .sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt))[0];
      const worstConclusion = channels.some(c => c.lastRunConclusion === 'failure') ? 'failure'
        : channels.some(c => c.lastRunConclusion === 'in_progress') ? 'in_progress'
        : channels.every(c => c.lastRunConclusion === 'success') ? 'success' : null;
      const health = conclusionMeta(worstConclusion);

      const kpis = [
        { label: 'Total videos published', value: String(totalVideos), meta: 'across ' + channels.length + ' channel' + (channels.length === 1 ? '' : 's'), cls: '' },
        { label: 'Videos published (7d)', value: String(videos7d), meta: 'from data/history-*.json', cls: '' },
        { label: 'Last published', value: mostRecent ? timeAgo(mostRecent.publishedAt) : 'never', meta: mostRecent ? mostRecent.title.slice(0, 40) : 'no videos yet', cls: '' },
        { label: 'Automation health', value: health.text, meta: state.data.revenueNote, cls: health.cls }
      ];

      const allUploads = channels
        .flatMap(c => c.recentVideos.map(v => ({ ...v, channelName: c.name })))
        .sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt))
        .slice(0, 6);

      const stagesBlock = channels.map(c => `
        <div style="margin-bottom:14px;">
          <div style="font-size:0.85rem; color:var(--muted); margin-bottom:8px;">${c.name} — last run</div>
          <div class="pipeline-list">
            ${c.stages.map(step => `
              <div class="pipeline-item">
                <div class="pipeline-left">
                  <div class="status-pill ${step.status}">
                    <span class="status-dot-small"></span>
                    ${step.name}
                  </div>
                </div>
                <small style="color:var(--muted);">${step.detail || ''}</small>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');

      return `
        <div class="grid kpi-grid">
          ${kpis.map(kpi => `
            <div class="card">
              <div class="stat-label">${kpi.label}</div>
              <div class="stat-value">${kpi.value}</div>
              <div class="stat-meta ${kpi.cls}">${kpi.meta}</div>
            </div>
          `).join('')}
        </div>

        <div class="grid overview-grid">
          <div class="stack">
            <div class="card">
              <div class="section-title">
                <h2>Pipeline status</h2>
                <span>from real GitHub Actions job logs</span>
              </div>
              ${stagesBlock}
            </div>
          </div>

          <div class="stack">
            <div class="card">
              <div class="section-title">
                <h2>Recent uploads</h2>
                <span>${allUploads.length} shown</span>
              </div>
              <div class="queue-list">
                ${allUploads.length ? allUploads.map(item => `
                  <a class="queue-item" href="${item.url}" target="_blank" rel="noopener">
                    <div>
                      <strong>${item.title}</strong>
                      <small>${item.channelName} &middot; ${timeAgo(item.publishedAt)}</small>
                    </div>
                    <span class="pill">Published</span>
                  </a>
                `).join('') : '<p class="empty-state">No videos published yet.</p>'}
              </div>
            </div>

            <div class="card">
              <div class="section-title">
                <h2>Recent workflow runs</h2>
                <span>updated ${timeAgo(state.data.generatedAt)}</span>
              </div>
              <div class="feed-list">
                ${state.data.recentActivity.map(run => {
                  const meta = conclusionMeta(run.conclusion || run.status);
                  return `
                    <a class="feed-item" href="${run.url}" target="_blank" rel="noopener">
                      <div>
                        <strong>Run #${run.id}</strong>
                        <small>${timeAgo(run.createdAt)}</small>
                      </div>
                      <span class="pill ${meta.cls === 'bad' ? 'off' : meta.cls === '' ? 'on' : ''}">${meta.text}</span>
                    </a>
                  `;
                }).join('')}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderPipeline() {
      const channels = selectedChannels();
      return `
        <div class="grid content-grid">
          <div class="card">
            <div class="section-title">
              <h2>Workflow map</h2>
              <span>real per-stage status, last run</span>
            </div>
            ${channels.map(c => `
              <div style="margin-bottom:16px;">
                <div style="font-size:0.85rem; color:var(--muted); margin-bottom:8px;">
                  ${c.name} &middot; <a href="${c.lastRunUrl || '#'}" target="_blank" rel="noopener">view run</a>
                </div>
                <div class="pipeline-list">
                  ${c.stages.map(step => `
                    <div class="pipeline-item">
                      <div class="pipeline-left">
                        <div class="status-pill ${step.status}">
                          <span class="status-dot-small"></span>
                          ${step.name}
                        </div>
                      </div>
                      <small style="color:var(--muted);">${step.detail || ''}</small>
                    </div>
                  `).join('')}
                </div>
              </div>
            `).join('')}
          </div>

          <div class="card">
            <div class="section-title">
              <h2>Channel health</h2>
              <span>current state</span>
            </div>
            <div class="channel-list">
              ${channels.map(c => {
                const meta = conclusionMeta(c.lastRunConclusion);
                return `
                  <div class="channel-line">
                    <div>
                      <b>${c.name}</b>
                      <small>${c.totalVideos} videos total &middot; ${c.videosLast7Days} in last 7 days</small>
                    </div>
                    <span class="pill ${meta.cls === 'bad' ? 'off' : meta.cls === '' ? 'on' : ''}">${meta.text}</span>
                  </div>
                `;
              }).join('')}
            </div>
            <div class="section-title" style="margin-top:18px;">
              <h2>Next scheduled runs</h2>
            </div>
            <div class="pill-row">
              ${state.data.nextScheduledRuns.map(t => `<span class="pill">${new Date(t).toLocaleString()} (${timeUntil(t)})</span>`).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function renderContent() {
      const channels = selectedChannels();
      const allUploads = channels
        .flatMap(c => c.recentVideos.map(v => ({ ...v, channelName: c.name })))
        .sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));

      return `
        <div class="grid content-grid">
          <div class="card">
            <div class="section-title">
              <h2>Recent uploads</h2>
              <span>from data/history-*.json</span>
            </div>
            <div class="queue-list">
              ${allUploads.length ? allUploads.map(item => `
                <a class="queue-item" href="${item.url}" target="_blank" rel="noopener">
                  <div>
                    <strong>${item.title}</strong>
                    <small>${item.channelName} &middot; ${timeAgo(item.publishedAt)}</small>
                  </div>
                  <span class="pill">Published</span>
                </a>
              `).join('') : '<p class="empty-state">No videos published yet.</p>'}
            </div>
          </div>

          <div class="card">
            <div class="section-title">
              <h2>Why no "queue"</h2>
              <span>by design</span>
            </div>
            <p class="empty-state">This pipeline has no draft/review queue &mdash; each scheduled run
              generates and publishes a video end-to-end with no human checkpoint. What you see here
              is what's actually been published, not a simulated backlog.</p>
          </div>
        </div>
      `;
    }

    function renderSettings() {
      const channels = selectedChannels();
      return `
        <div class="stack">
          ${channels.map(c => `
            <div class="card">
              <div class="section-title">
                <h2>${c.name}</h2>
                <span>config/channels.json</span>
              </div>
              <div class="settings-list">
                <div class="settings-item">
                  <div><strong>Niche</strong></div>
                  <small style="color:var(--muted); text-align:right; max-width:60%;">${c.niche}</small>
                </div>
                <div class="settings-item">
                  <div><strong>Format</strong></div>
                  <span class="pill">${c.format === 'short' ? 'Short (vertical)' : 'Long-form (landscape)'}</span>
                </div>
                <div class="settings-item">
                  <div><strong>Visual style</strong></div>
                  <span class="pill">${c.visualStyle}</span>
                </div>
                <div class="settings-item">
                  <div><strong>Made for kids</strong></div>
                  <span class="pill ${c.madeForKids ? 'on' : 'off'}">${c.madeForKids ? 'Yes — comments/ads restricted' : 'No'}</span>
                </div>
              </div>
            </div>
          `).join('')}
          <p class="empty-state">This is a read-only reflection of config/channels.json &mdash; there's
            no backend server for this static page to write changes back to. Edit the JSON file and
            re-run <code>node build-data.js</code> to update.</p>
        </div>
      `;
    }

    function render() {
      document.getElementById('pageTitle').textContent = navItems.find(item => item.id === state.tab)?.label || 'Overview';

      const generated = new Date(state.data.generatedAt);
      document.getElementById('pageSubtext').textContent =
        `Data as of ${generated.toLocaleString()} (${timeAgo(state.data.generatedAt)}) — re-run build-data.js to refresh`;

      renderNav();
      renderChips();

      const container = document.getElementById('content');
      switch (state.tab) {
        case 'pipeline': container.innerHTML = renderPipeline(); break;
        case 'content': container.innerHTML = renderContent(); break;
        case 'settings': container.innerHTML = renderSettings(); break;
        default: container.innerHTML = renderOverview();
      }
    }

    async function init() {
      try {
        const res = await fetch('./data.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        state.data = await res.json();
        render();
      } catch (err) {
        document.getElementById('content').innerHTML =
          `<div class="card"><p class="empty-state">Could not load data.json (${err.message}). ` +
          `Run <code>node build-data.js</code> in the frontend/ folder first, and serve this folder ` +
          `over http:// rather than opening it as a file:// URL.</p></div>`;
        document.getElementById('pageSubtext').textContent = 'No data loaded';
      }
    }

    init();
  </script>
</body>
</html>
